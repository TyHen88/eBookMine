# Netlify configuration for the eBookMine Next.js app.
# The official Next.js runtime (@netlify/plugin-nextjs) is installed automatically
# when this plugin is listed below; it handles SSR routes, API routes and image
# optimization as serverless functions.

[build]
  # Build with the webpack engine: Netlify's Next.js runtime does not yet fully
  # support Turbopack production builds (the Next 16 default). copy-worker stages
  # the pdf.js worker into /public before the build.
  command = "npm run copy-worker && next build --webpack"
  publish = ".next"

[build.environment]
  # Next.js 16 requires Node 20.9+.
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
